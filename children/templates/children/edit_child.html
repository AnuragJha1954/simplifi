{% extends "accounts/dashboard.html" %}
{% block content %}

<div class="max-w-xl">

  <h2 class="text-2xl font-semibold mb-6">
    Edit Child — {{ child.child_user.username }}
  </h2>

  <form method="POST" class="bg-white border rounded-2xl p-8 space-y-6">
    {% csrf_token %}

    <div>
      <label class="text-sm text-slate-600">Age</label>
      <input type="number" name="age" value="{{ child.age }}"
        class="w-full mt-2 px-4 py-3 border rounded-xl focus:ring-2 focus:ring-cyan-200 focus:border-cyan-500">
    </div>

    <button type="submit"
      class="bg-cyan-500 text-white px-6 py-3 rounded-xl hover:bg-cyan-600">
      Save Changes
    </button>

  </form>

</div>

{% endblock %}
