{% extends "accounts/dashboard.html" %}
{% block content %}

<h2 class="text-2xl font-semibold mb-6">
Reset Password — {{ child.child_user.username }}
</h2>

{% if success %}
<div class="mb-4 bg-green-50 border border-green-200 text-green-700 px-4 py-2 rounded">
{{ success }}
</div>
{% endif %}

<div class="bg-white border rounded-xl p-6 max-w-md">

<form method="POST">

{% csrf_token %}

<input
type="password"
name="password"
placeholder="New Password"
class="w-full border rounded-xl px-4 py-3 mb-4"
required>

<button
class="bg-cyan-500 text-white px-5 py-3 rounded-xl">

Update Password

</button>

</form>

</div>

{% endblock %}
