{% extends "accounts/dashboard.html" %}
{% block content %}
{# edit_allowance.html - copy as edit_allowance.html #}

<style>
  .simple-form-wrap { max-width: 500px; }

  .simple-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 30px;
    position: relative;
    overflow: hidden;
    animation: cardIn 0.5s cubic-bezier(0.16,1,0.3,1) 0.05s both;
  }

  .simple-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  }

  .cat-label-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 18px;
  }

  .cat-label-row-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .cat-label-row-val {
    font-weight: 600;
    font-size: 13px;
    color: var(--cyan);
  }

  .field-group { margin-bottom: 16px; }

  .field-group label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-3);
    margin-bottom: 6px;
  }

  .field-group input,
  .field-group select {
    width: 100%;
    padding: 10px 13px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    color: var(--ink);
    background: var(--bg-3);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .field-group input:focus,
  .field-group select:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px rgba(6,182,212,0.1);
    background: var(--bg-2);
  }

  .success-alert {
    background: rgba(16,185,129,0.08);
    border: 1px solid rgba(16,185,129,0.2);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--green);
    font-family: 'JetBrains Mono', monospace;
    animation: cardIn 0.4s ease both;
  }

  .form-actions {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-top: 20px;
  }

  .btn-back {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-3);
    text-decoration: none;
    letter-spacing: 0.05em;
    transition: color 0.2s;
  }

  .btn-back:hover { color: var(--cyan); }
</style>

<div class="page-header">
  <div>
    <div class="page-title">Edit Allowance</div>
    <div class="page-subtitle">// UPDATE CATEGORY BUDGET</div>
  </div>
</div>

<div class="simple-form-wrap">
  <div class="simple-card">

    <div class="cat-label-row">
      <span class="cat-label-row-text">Category:</span>
      <span class="cat-label-row-val">{{ category.name }}</span>
    </div>

    <form method="POST">
      {% csrf_token %}

      <div class="field-group">
        <label>New Amount (₹)</label>
        <input type="number" name="amount" value="{{ category.allocated_amount }}" required min="0">
      </div>

      <div class="form-actions">
        <button type="submit" class="submit-btn"><span>Update Allowance →</span></button>
        <a href="javascript:history.back()" class="btn-back">← Cancel</a>
      </div>
    </form>

  </div>
</div>

{% endblock %}
