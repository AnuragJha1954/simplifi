{% extends "accounts/dashboard.html" %}
{% block content %}

<style>
  .settings-shell {
    max-width: 520px;
  }

  .settings-form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 30px;
    position: relative;
    overflow: hidden;
    animation: cardIn 0.5s cubic-bezier(0.16,1,0.3,1) 0.05s both;
  }

  .settings-form-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  }

  .user-display {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 20px;
  }

  .user-av {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--cyan), var(--teal));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: #000;
    box-shadow: 0 0 10px var(--cyan-glow);
  }

  .user-av-info {}
  .user-av-name { font-size: 13px; font-weight: 600; color: var(--ink); }
  .user-av-role {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--cyan);
  }

  .field-group { margin-bottom: 16px; }

  .field-group label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-3);
    margin-bottom: 6px;
  }

  .field-group input {
    width: 100%;
    padding: 10px 13px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    color: var(--ink);
    background: var(--bg-3);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .field-group input:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px rgba(6,182,212,0.1);
    background: var(--bg-2);
  }

  .success-alert {
    background: rgba(16,185,129,0.08);
    border: 1px solid rgba(16,185,129,0.2);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--green);
    font-family: 'JetBrains Mono', monospace;
    animation: cardIn 0.4s ease both;
  }
</style>

<div class="page-header">
  <div>
    <div class="page-title">Profile Settings</div>
    <div class="page-subtitle">// UPDATE YOUR ACCOUNT DETAILS</div>
  </div>
</div>

<div class="settings-shell">

  {% if success %}
  <div class="success-alert">
    <span>✓</span> {{ success }}
  </div>
  {% endif %}

  <div class="settings-form-card">

    <div class="user-display">
      <div class="user-av">{{ request.user.username|first|upper }}</div>
      <div class="user-av-info">
        <div class="user-av-name">{{ request.user.username }}</div>
        <div class="user-av-role">Child Account</div>
      </div>
    </div>

    <form method="POST">
      {% csrf_token %}

      <div class="field-group">
        <label>Age</label>
        <input type="number" name="age" value="{{ child.age }}" placeholder="Your age" min="1" max="25">
      </div>

      <button type="submit" class="submit-btn" style="margin-top:8px;"><span>Save Changes →</span></button>
    </form>

  </div>
</div>

{% endblock %}
